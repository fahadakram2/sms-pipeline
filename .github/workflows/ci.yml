name: sms-pipeline

on: 
    push:
        branches:
            - main
            - 'feature/*'
    workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend, backend]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
            node-version: 20

      - name: Install Dependency
        run: |
          cd ${{ matrix.app }}
          npm install

  test-and-audit:
    runs-on: ubuntu-latest
    needs: install

    strategy:
      matrix:
        app: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20

      - name: Install Dependency
        run: | 
          cd ${{ matrix.app }}
          npm install

      - name: Run Tests
        run: |
          echo 'Runing Tests for ${{ matrix.app }}'

      - name: Security Audit
        run: |
          cd ${{ matrix.app }}
          npm audit --audit-level=critical

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
            path: ~/.npm
            key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  sonar:
    runs-on: ubuntu-latest
    needs: test-and-audit
    strategy:
      matrix:
        app: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: SonarQube
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: > 
            -Dsonar.projectKey=github-sms-${{ matrix.app }}
            -Dsonar.sources=.
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}