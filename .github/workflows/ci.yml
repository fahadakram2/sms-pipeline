name: sms-pipeline

on: 
    push:
        branches:
            - main
            - 'feature/*'
    workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend, backend]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
            node-version: 20

      - name: Install Dependency
        run: |
          cd ${{ matrix.app }}
          npm install

  test-and-audit:
    runs-on: ubuntu-latest
    needs: install

    strategy:
      matrix:
        app: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20

      - name: Install Dependency
        run: | 
          cd ${{ matrix.app }}
          npm install

      - name: Run Tests
        run: |
          echo 'Runing Tests for ${{ matrix.app }}'

      - name: Security Audit
        run: |
          cd ${{ matrix.app }}
          npm audit --audit-lavel=critical